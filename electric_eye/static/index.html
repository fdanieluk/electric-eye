<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>electric-eye</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --fg: #e8e8ea;
    --muted: #8b8d94;
    --card: #181b22;
    --border: #2a2e38;
    --accent: #4f8cff;
    --ok: #2fb344;
    --err: #ff5c5c;
    --warn: #e8a820;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f7f7f9; --fg:#1a1a1c; --muted:#6b6f78; --card:#fff; --border:#e2e4ea; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    padding: 1rem;
    max-width: 900px;
    margin-inline: auto;
  }
  h1 { font-size: 1.4rem; margin: 0 0 1rem; }
  h2 { font-size: 1.1rem; margin: 1.5rem 0 .75rem; color: var(--muted); }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .75rem 1rem;
    margin-bottom: .5rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: .5rem 1rem;
    align-items: center;
  }
  .card.busy { opacity: .55; }
  .card.flash-ok { box-shadow: 0 0 0 2px var(--ok) inset; }
  .card.flash-err { box-shadow: 0 0 0 2px var(--err) inset; }
  .card.warn { box-shadow: 0 0 0 2px var(--warn) inset; }
  .name { font-weight: 500; }
  .count { color: var(--muted); font-size: .8rem; margin-left: .4rem; }
  .id { color: var(--muted); font-size: .8rem; margin-left: .4rem; }
  .type-badge {
    display: inline-block;
    font-size: .65rem;
    padding: .1rem .4rem;
    border-radius: 4px;
    background: var(--border);
    color: var(--muted);
    margin-left: .4rem;
    vertical-align: middle;
  }
  .warn-text {
    grid-column: 1 / -1;
    font-size: .75rem;
    color: var(--warn);
  }
  .controls { display: flex; gap: .4rem; flex-wrap: wrap; }
  button {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .4rem .7rem;
    font: inherit;
    cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { cursor: not-allowed; opacity: .5; }
  .slider-row {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: .6rem;
  }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  .pct { width: 4ch; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
  .empty, .error { color: var(--muted); padding: 1rem; }
  .error { color: var(--err); }
  .section-toggle {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font: inherit;
    font-size: .95rem;
    padding: 0;
    margin: 1.5rem 0 .75rem;
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .section-toggle .arrow { transition: transform .2s; }
  .section-toggle.open .arrow { transform: rotate(90deg); }
  .devices-section { display: none; }
  .devices-section.open { display: block; }
</style>
</head>
<body>
<h1>electric-eye</h1>
<div id="app" class="empty">Loading...</div>

<script>
const app = document.getElementById("app");
let groupsData = {};
let devicesData = [];
let stateData = {};

const TYPE_LABELS = { 1: "roller", 3: "roller", 7: "tilt blind" };

async function init() {
  try {
    const [gRes, dRes, sRes] = await Promise.all([
      fetch("/api/groups"),
      fetch("/api/devices"),
      fetch("/api/state"),
    ]);
    if (!gRes.ok) throw new Error(`groups: HTTP ${gRes.status}`);
    if (!dRes.ok) throw new Error(`devices: HTTP ${dRes.status}`);
    groupsData = await gRes.json();
    devicesData = await dRes.json();
    if (sRes.ok) stateData = await sRes.json();
    render();
  } catch (e) {
    app.className = "error";
    app.textContent = `Failed to load: ${e.message}`;
  }
}

function parsePercent(value) {
  if (!value) return null;
  const m = value.match(/^(\d+)%$/);
  return m ? Number(m[1]) : null;
}

function apiToSlider(apiPercent) {
  // API: 100% = fully open (up), 0% = fully closed (down)
  // Slider: 0 = open (up), 100 = closed (down)
  return 100 - apiPercent;
}

function render() {
  app.className = "";
  app.innerHTML = "";

  const deviceNames = {};
  const deviceTypes = {};
  for (const d of devicesData) {
    deviceNames[String(d.id)] = d.name;
    deviceTypes[String(d.id)] = d.type;
  }

  // Separate floors from rooms
  const floors = ["parter", "pietro"];
  const floorGroups = {};
  const roomGroups = {};
  for (const [name, ids] of Object.entries(groupsData)) {
    if (floors.includes(name)) floorGroups[name] = ids;
    else roomGroups[name] = ids;
  }

  // Floors section
  if (Object.keys(floorGroups).length) {
    const h = document.createElement("h2");
    h.textContent = "Floors";
    app.appendChild(h);
    for (const [name, ids] of Object.entries(floorGroups)) {
      app.appendChild(makeGroupCard(name, ids, deviceNames, deviceTypes));
    }
  }

  // Rooms section
  const h = document.createElement("h2");
  h.textContent = "Rooms";
  app.appendChild(h);
  for (const [name, ids] of Object.entries(roomGroups)) {
    app.appendChild(makeGroupCard(name, ids, deviceNames, deviceTypes));
  }

  // Devices section (collapsible)
  const toggle = document.createElement("button");
  toggle.className = "section-toggle";
  toggle.innerHTML = '<span class="arrow">&#9654;</span> Individual devices';
  const devSection = document.createElement("div");
  devSection.className = "devices-section";
  toggle.addEventListener("click", () => {
    toggle.classList.toggle("open");
    devSection.classList.toggle("open");
  });
  app.appendChild(toggle);
  app.appendChild(devSection);

  for (const d of devicesData) {
    devSection.appendChild(makeDeviceCard(d));
  }
}

function groupSliderPosition(ids) {
  const percents = ids.map(id => parsePercent((stateData[id] || {}).value)).filter(v => v !== null);
  if (!percents.length) return 50;
  const avg = Math.round(percents.reduce((a, b) => a + b, 0) / percents.length);
  return apiToSlider(avg);
}

function makeGroupCard(name, ids, deviceNames, deviceTypes) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.group = name;
  const label = name.replace(/-/g, " ");
  const tooltip = ids.map(id => deviceNames[id] || `#${id}`).join("\n");
  const sliderVal = groupSliderPosition(ids);
  card.innerHTML = `
    <div>
      <span class="name">${escapeHtml(label)}</span>
      <span class="count" title="${escapeHtml(tooltip)}">${ids.length} device${ids.length === 1 ? "" : "s"}</span>
    </div>
    <div class="controls">
      <button data-action="up">UP</button>
      <button data-action="stop">STOP</button>
      <button data-action="down">DOWN</button>
    </div>
    <div class="slider-row">
      <input type="range" min="0" max="100" value="${sliderVal}">
      <span class="pct">${sliderVal}%</span>
      <button data-action="set">Set</button>
    </div>
  `;
  const slider = card.querySelector("input[type=range]");
  const pct = card.querySelector(".pct");
  slider.addEventListener("input", () => pct.textContent = slider.value + "%");
  card.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => onGroupAction(card, name, ids, btn.dataset.action, slider.value));
  });
  return card;
}

function makeDeviceCard(d) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = d.id;
  const typeLabel = TYPE_LABELS[d.type] || `type ${d.type}`;
  const apiPct = parsePercent((stateData[String(d.id)] || {}).value);
  const sliderVal = apiPct !== null ? apiToSlider(apiPct) : 50;
  card.innerHTML = `
    <div>
      <span class="name">${escapeHtml(d.name)}</span>
      <span class="id">#${d.id}</span>
      <span class="type-badge">${escapeHtml(typeLabel)}</span>
    </div>
    <div class="controls">
      <button data-action="up">UP</button>
      <button data-action="stop">STOP</button>
      <button data-action="down">DOWN</button>
    </div>
    <div class="slider-row">
      <input type="range" min="0" max="100" value="${sliderVal}">
      <span class="pct">${sliderVal}%</span>
      <button data-action="set">Set</button>
    </div>
  `;
  const slider = card.querySelector("input[type=range]");
  const pct = card.querySelector(".pct");
  slider.addEventListener("input", () => pct.textContent = slider.value + "%");
  card.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => onDeviceAction(card, d.id, btn.dataset.action, slider.value));
  });
  return card;
}

async function pollState() {
  try {
    const res = await fetch("/api/state");
    if (res.ok) stateData = await res.json();
  } catch (e) { /* ignore */ }
}

function checkConfirmation(card, deviceIds, expectedAction, expectedPercent) {
  setTimeout(async () => {
    await pollState();
    let mismatch = false;
    if (expectedAction === "set") {
      const expectedApi = 100 - Number(expectedPercent);
      for (const id of deviceIds) {
        const reported = parsePercent((stateData[String(id)] || {}).value);
        if (reported !== null && Math.abs(reported - expectedApi) > 5) {
          mismatch = true;
          break;
        }
      }
    }
    // Update sliders to actual state
    if (deviceIds.length === 1) {
      const reported = parsePercent((stateData[String(deviceIds[0])] || {}).value);
      if (reported !== null) {
        const slider = card.querySelector("input[type=range]");
        const pct = card.querySelector(".pct");
        const sv = apiToSlider(reported);
        slider.value = sv;
        pct.textContent = sv + "%";
      }
    } else {
      const sv = groupSliderPosition(deviceIds);
      const slider = card.querySelector("input[type=range]");
      const pct = card.querySelector(".pct");
      slider.value = sv;
      pct.textContent = sv + "%";
    }
    // Show warning if mismatch
    card.querySelector(".warn-text")?.remove();
    card.classList.remove("warn");
    if (mismatch) {
      card.classList.add("warn");
      const w = document.createElement("div");
      w.className = "warn-text";
      w.textContent = "Position not confirmed — device may still be moving";
      card.appendChild(w);
      setTimeout(() => { card.classList.remove("warn"); w.remove(); }, 8000);
    }
  }, 4000);
}

async function onGroupAction(card, name, ids, action, percent) {
  setBusy(card, true);
  try {
    let url = `/api/groups/${encodeURIComponent(name)}/${action}`;
    let opts = { method: "POST" };
    if (action === "set") {
      opts.headers = { "Content-Type": "application/json" };
      opts.body = JSON.stringify({ percent: 100 - Number(percent) });
    }
    const res = await fetch(url, opts);
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `HTTP ${res.status}`);
    }
    flash(card, "ok");
    checkConfirmation(card, ids, action, percent);
  } catch (e) {
    console.error(e);
    flash(card, "err");
  } finally {
    setBusy(card, false);
  }
}

async function onDeviceAction(card, id, action, percent) {
  setBusy(card, true);
  try {
    let url = `/api/devices/${id}/${action}`;
    let opts = { method: "POST" };
    if (action === "set") {
      opts.headers = { "Content-Type": "application/json" };
      opts.body = JSON.stringify({ percent: 100 - Number(percent) });
    }
    const res = await fetch(url, opts);
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `HTTP ${res.status}`);
    }
    flash(card, "ok");
    checkConfirmation(card, [id], action, percent);
  } catch (e) {
    console.error(e);
    flash(card, "err");
  } finally {
    setBusy(card, false);
  }
}

function setBusy(card, busy) {
  card.classList.toggle("busy", busy);
  card.querySelectorAll("button").forEach(b => b.disabled = busy);
}

function flash(card, kind) {
  const cls = `flash-${kind}`;
  card.classList.add(cls);
  setTimeout(() => card.classList.remove(cls), 800);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

init();
</script>
</body>
</html>
